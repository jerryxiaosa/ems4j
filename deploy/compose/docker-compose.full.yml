services:
  mysql:
    image: mysql:8.0.29
    container_name: ems-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-ems_db}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-Ems@123456}
      TZ: Asia/Shanghai
    ports:
      - "${MYSQL_PORT:-13306}:3306"
    command:
      [
        "mysqld",
        "--character-set-server=utf8mb4",
        "--collation-server=utf8mb4_unicode_ci"
      ]
    volumes:
      - mysql_data:/var/lib/mysql
      - ../mysql/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 20

  redis:
    image: redis:6.2
    container_name: ems-redis
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-123456}
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:-123456}"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a $$REDIS_PASSWORD ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 20

  rabbitmq:
    build:
      context: ../..
      dockerfile: deploy/rabbitmq/Dockerfile
      args:
        RABBITMQ_DELAYED_PLUGIN_URL: https://github.com/rabbitmq/rabbitmq-delayed-message-exchange/releases/download/v4.1.0/rabbitmq_delayed_message_exchange-4.1.0.ez
    image: ems-rabbitmq:4.1-delayed
    container_name: ems-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-emsuser}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-ems@pass}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_DEFAULT_VHOST:-ems}
      TZ: Asia/Shanghai
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 10s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: ../..
      dockerfile: deploy/backend/Dockerfile
    container_name: ems-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-ems_db}?serverTimezone=Asia/Shanghai&useUnicode=true&characterEncoding=UTF8&useSSL=false&allowPublicKeyRetrieval=true&allowMultiQueries=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD:-Ems@123456}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD:-123456}
      SPRING_RABBITMQ_ADDRESSES: rabbitmq:5672
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_DEFAULT_USER:-emsuser}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_DEFAULT_PASS:-ems@pass}
      SPRING_RABBITMQ_VIRTUAL_HOST: ${RABBITMQ_DEFAULT_VHOST:-ems}
      SA_TOKEN_JWT_SECRET_KEY: ${SA_TOKEN_JWT_SECRET_KEY:-change_me}
      TZ: Asia/Shanghai
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    volumes:
      - ../../logs:/app/logs

  iot:
    build:
      context: ../..
      dockerfile: deploy/iot/Dockerfile
    container_name: ems-iot
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      backend:
        condition: service_started
    environment:
      SPRING_PROFILES_ACTIVE: docker,netty
      IOT_SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/iot_db?serverTimezone=Asia/Shanghai&useUnicode=true&characterEncoding=UTF8&useSSL=false&allowPublicKeyRetrieval=true&allowMultiQueries=true
      IOT_SPRING_DATASOURCE_USERNAME: root
      IOT_SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD:-Ems@123456}
      IOT_REPORT_PUSH_ENABLED: true
      IOT_REPORT_PUSH_BASE_URL: http://backend:8080
      IOT_REPORT_PUSH_PATH: /v1/device/energy-reports/standard
      IOT_REPORT_PUSH_SOURCE: IOT
      IOT_PORT: 8880
      IOT_NETTY_PORT: 19500
      TZ: Asia/Shanghai
    ports:
      - "${IOT_PORT:-8880}:8880"
      - "${IOT_NETTY_PORT:-19500}:19500"
    volumes:
      - ../../logs:/app/logs

  iot-simulator:
    build:
      context: ../..
      dockerfile: deploy/iot-simulator/Dockerfile
    container_name: ems-iot-simulator
    restart: unless-stopped
    depends_on:
      iot:
        condition: service_started
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SIMULATOR_TARGET_HOST: iot
      SIMULATOR_TARGET_PORT: 19500
      SIMULATOR_RUNTIME_PERSISTENCE_FILE: /app/.data/iot-simulator-state.json
      SIMULATOR_REPLAY_ENABLED: false
      TZ: Asia/Shanghai
    volumes:
      - iot_simulator_data:/app/.data

  frontend:
    build:
      context: ../..
      dockerfile: deploy/frontend/Dockerfile
    container_name: ems-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
    ports:
      - "${FRONTEND_PORT:-4173}:80"

volumes:
  mysql_data:
  redis_data:
  rabbitmq_data:
  iot_simulator_data:
