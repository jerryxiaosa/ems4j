apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
spec:
  replicas: {{ .Values.frontend.replicas }}
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
{{ toYaml . | indent 8 }}
      {{- end }}
      containers:
        - name: frontend
          image: {{ include "ems-app.frontendFullImage" . }}
          imagePullPolicy: {{ .Values.frontend.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 80
          env:
{{ include "ems-app.timezoneEnv" . | nindent 12 }}
          volumeMounts:
{{ include "ems-app.timezoneVolumeMounts" . | nindent 12 }}
      volumes:
{{ include "ems-app.timezoneVolumes" . | nindent 8 }}
