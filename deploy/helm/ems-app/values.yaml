global:
  imagePullSecrets: []
  timezone: "Asia/Shanghai"
  javaToolOptions: "-Duser.timezone=Asia/Shanghai"

image:
  registry: "172.22.0.8:8088/ems"

backend:
  image:
    repository: "backend"
    tag: "0.6.0"
    pullPolicy: IfNotPresent
  replicas: 1
  service:
    port: 8080
    nodePortEnabled: false
    nodePort: 30081
  env:
    profile: "docker"
    datasourceUrl: "jdbc:mysql://mysql.ems-infra.svc.cluster.local:3306/ems_db?serverTimezone=Asia/Shanghai&useUnicode=true&characterEncoding=UTF8&useSSL=false&allowPublicKeyRetrieval=true&allowMultiQueries=true"
    datasourceUsername: "root"
    redisHost: "redis.ems-infra.svc.cluster.local"
    redisPort: "6379"
    rabbitmqAddresses: "rabbitmq.ems-infra.svc.cluster.local:5672"
  secret:
    datasourcePassword: "Ems@123456"
    redisPassword: "123456"
    rabbitmqUsername: "emsuser"
    rabbitmqPassword: "ems@pass"
    rabbitmqVhost: "ems"
    jwtSecretKey: "change_me"

frontend:
  image:
    repository: "frontend"
    tag: "0.6.0"
    pullPolicy: IfNotPresent
  replicas: 1
  service:
    nodePort: 30080

iot:
  image:
    repository: "iot"
    tag: "0.6.0"
    pullPolicy: IfNotPresent
  replicas: 1
  service:
    httpPort: 8880
    nettyPort: 19500
    nettyNodePortEnabled: true
    nettyNodePort: 31950
  env:
    profile: "docker,netty"
    datasourceUrl: "jdbc:mysql://mysql.ems-infra.svc.cluster.local:3306/iot_db?serverTimezone=Asia/Shanghai&useUnicode=true&characterEncoding=UTF8&useSSL=false&allowPublicKeyRetrieval=true&allowMultiQueries=true"
    datasourceUsername: "root"
    reportPushEnabled: "true"
    reportPushBaseUrl: "http://backend.ems-app.svc.cluster.local:8080"
    reportPushPath: "/v1/device/energy-reports/standard"
    reportPushSource: "IOT"
    port: "8880"
    nettyPort: "19500"
    nettyBossThreads: "1"
    nettyWorkerThreads: "4"
  secret:
    datasourcePassword: "Ems@123456"

iotSimulator:
  image:
    repository: "iot-simulator"
    tag: "0.6.0"
    pullPolicy: IfNotPresent
  replicas: 1
  env:
    profile: "docker"
    targetHost: "iot"
    targetPort: "19500"
    targetConnectTimeoutMs: "5000"
    targetReconnectIntervalMs: "3000"
    runtimeHeartbeatIntervalSeconds: "60"
    runtimePersistenceFile: "/data/iot-simulator-state.json"
  persistence:
    enabled: true
    size: "1Gi"
    storageClassName: "local-path"
